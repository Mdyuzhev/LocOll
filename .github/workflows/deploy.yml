name: Deploy LocOll Portal

on:
  push:
    branches: [main]

concurrency:
  group: deploy-locoll
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Homelab
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Pull latest code
        run: |
          cd /opt/locoll
          git fetch origin main
          git reset --hard origin/main

      - name: Clean up old containers
        run: |
          docker stop locoll-frontend 2>/dev/null || true
          docker rm locoll-frontend 2>/dev/null || true
          cd /opt/locoll
          docker compose down --remove-orphans 2>/dev/null || true

      - name: Build and start portal
        run: |
          cd /opt/locoll
          docker compose build --no-cache
          docker compose up -d

      - name: Verify Ollama (host)
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama: OK"
              exit 0
            fi
            echo "Waiting for Ollama... ($i/10)"
            sleep 2
          done
          echo "Ollama not running on host"
          exit 1

      - name: Verify portal
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:4000/api/v1/health > /dev/null 2>&1; then
              echo "Portal: OK"
              curl -s http://localhost:4000/api/v1/health
              exit 0
            fi
            echo "Waiting for portal... ($i/15)"
            sleep 3
          done
          echo "Portal failed to start"
          cd /opt/locoll && docker compose logs --tail=30
          exit 1

      - name: Show status
        run: |
          cd /opt/locoll
          docker compose ps
          echo "---"
          echo "Portal: http://192.168.1.74:4000"
