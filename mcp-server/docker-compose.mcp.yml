services:
  homelab-mcp:
    build: .
    image: homelab-mcp:latest
    container_name: homelab-mcp
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Project directories for git/deploy operations
      - /opt/locoll:/opt/locoll
      - /opt/errorlens:/opt/errorlens
      - /opt/warehouse:/opt/warehouse
      - /opt/homelab-mcp:/opt/homelab-mcp
      - /home/flomaster:/home/flomaster
      - homelab_mcp_data:/data
    environment:
      - CACHE_DB_PATH=/data/homelab.db

volumes:
  homelab_mcp_data:
