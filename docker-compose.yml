version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: locoll-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # CPU-only — без deploy.resources.reservations
    # Для GPU раскомментировать:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: locoll-frontend
    ports:
      - "8080:80"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
    name: locoll-models
