services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portal_data:/app/data
    environment:
      - LOCOLL_DB_PATH=file:/app/data/portal.db?_journal=WAL
      - OLLAMA_URL=http://localhost:11434
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    ports:
      - "4000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  portal_data:
